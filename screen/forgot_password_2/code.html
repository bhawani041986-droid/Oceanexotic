<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary/30">

<div class="mb-8">

</div>
<h1 class="font-headline text-[30px] font-bold tracking-tight text-on-surface mb-3">Forgot Password</h1>
<p class="text-on-surface-variant text-body-lg">
                Enter the email address associated with your seller account and we'll send you a link to reset your password.
            </p>
</div>
<!-- Form Card -->
<div class="bg-surface-container-low border border-outline-variant/20 rounded-xl p-8 shadow-2xl relative overflow-hidden">
<!-- Subtle gradient overlay to mimic "deep water" tech feel -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 via-transparent to-transparent pointer-events-none"></div>
<form class="space-y-6 relative z-10">
<div class="space-y-2">
<label class="block font-medium text-body-sm text-on-surface ml-1" for="email">
                        Seller Email Address
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="block w-full h-[48px] pl-11 pr-4 bg-surface-container-highest border border-outline-variant/50 rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all duration-200" id="email" name="email" placeholder="name@deepsea-exports.com" required="" type="email"/>
</div>
</div>
<button class="w-full h-[48px] bg-[#7C3AED] hover:bg-[#6D28D9] active:scale-[0.98] text-white font-semibold rounded-lg shadow-lg shadow-primary/20 transition-all duration-200 flex items-center justify-center gap-2 group" type="submit">
<span>Reset Password</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</form>
</div>
