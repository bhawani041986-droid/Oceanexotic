<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 shadow-sm">

<p class="text-on-surface-variant text-body-lg">Access the deep ocean marketplace</p>

<div class="space-y-2">

<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full h-[44px] pl-12 pr-4 bg-surface-container-lowest border border-outline-variant/50 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline/50" placeholder="explorer@abyssal.tech" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-[12px] font-medium tracking-wider uppercase text-on-surface-variant">Security Credentials</label>
<a class="text-[12px] text-primary hover:text-primary-fixed transition-colors font-medium" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full h-[44px] pl-12 pr-4 bg-surface-container-lowest border border-outline-variant/50 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline/50" placeholder="••••••••••••" type="password"/>
</div>
</div>
<button class="w-full h-[44px] text-white font-semibold rounded-xl active:scale-95 transition-all shadow-lg shadow-primary-container/20 flex items-center justify-center gap-2" style="background-color: #7C3AED;" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center gap-4 my-10">
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
<span class="text-on-surface-variant font-label text-[10px] tracking-widest uppercase">Federated Login</span>
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-[44px] bg-surface-container-high hover:bg-surface-variant border border-outline-variant/20 rounded-xl transition-all active:scale-95">

<span class="font-medium text-body-sm">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-[44px] bg-surface-container-high hover:bg-surface-variant border border-outline-variant/20 rounded-xl transition-all active:scale-95">
<span class="material-symbols-outlined text-primary" data-icon="anchor">anchor</span>
<span class="font-medium text-body-sm">Maritime ID</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-body-sm">
                        New to the enterprise? 
                        <a class="text-primary font-semibold hover:underline underline-offset-4 decoration-2" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Trust Badge Section -->
<div class="mt-8 grid grid-cols-3 gap-4 opacity-50 grayscale hover:opacity-100 hover:grayscale-0 transition-all duration-700">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-[20px]" data-icon="verified_user">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">SECURE NODE</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-[20px]" data-icon="terminal">terminal</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">E2E ENCRYPTED</span>

<div class="flex flex-col items-center gap-1">

<p class="text-outline text-[11px] uppercase tracking-[0.2em] font-medium opacity-60">
            Authorized Personnel Only • IP Logged: 192.168.1.1
        </p>
