<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanExotic Global | Master Branding Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00D1FF;
            --background: #020617;
            --foreground: #F8FAFC;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--background);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .branding-container {
            position: relative;
            width: 800px;
            height: 200px;
            filter: drop-shadow(0 0 30px rgba(0, 209, 255, 0.1));
        }

        @keyframes neonTravel {
            0% { stroke-dashoffset: 1500; }
            100% { stroke-dashoffset: 0; }
        }

        @keyframes hairyPulse {
            0% { filter: drop-shadow(0 0 1px #00D1FF) drop-shadow(0 0 2px #F0ABFC); }
            33% { filter: drop-shadow(0 0 1.5px #FACC15) drop-shadow(0 0 2.5px #00D1FF); }
            66% { filter: drop-shadow(0 0 1px #F0ABFC) drop-shadow(0 0 2px #FACC15); }
            100% { filter: drop-shadow(0 0 1px #00D1FF) drop-shadow(0 0 2px #F0ABFC); }
        }

        .neon-path {
            stroke-dasharray: 200 1300;
            animation: neonTravel 3s linear infinite;
        }

        .hairy-glow {
            animation: hairyPulse 4s ease-in-out infinite;
            transform-origin: center;
        }

        .rgb-eye {
            filter: drop-shadow(0 0 5px #00D1FF);
        }

        .label {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5em;
            font-size: 10px;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="branding-container">
        <svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <defs>
                <linearGradient id="neonGradient-master" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#00D1FF">
                        <animate attributeName="stop-color" values="#00D1FF;#F0ABFC;#FACC15;#00D1FF" dur="4s" repeatCount="indefinite" />
                    </stop>
                    <stop offset="100%" stop-color="#F0ABFC">
                        <animate attributeName="stop-color" values="#F0ABFC;#FACC15;#00D1FF;#F0ABFC" dur="4s" repeatCount="indefinite" />
                    </stop>
                </linearGradient>

                <radialGradient id="eyeGradient-master">
                    <stop offset="0%" stop-color="#FFFFFF" />
                    <stop offset="100%" stop-color="#00D1FF">
                        <animate attributeName="stop-color" values="#00D1FF;#F0ABFC;#FACC15;#00D1FF" dur="2s" repeatCount="indefinite" />
                    </stop>
                </radialGradient>

                <mask id="pomfret-mask-master">
                    <rect x="0" y="0" width="100" height="100" fill="white" />
                    <text x="50" y="52" text-anchor="middle" dominant-baseline="middle" fill="black" font-size="24" font-weight="900" font-family="Inter, sans-serif" font-style="italic" style="letter-spacing: -1px">OX</text>
                    <line x1="38" y1="44" x2="15" y2="44" stroke="black" stroke-width="2.5" />
                    <line x1="62" y1="58" x2="88" y2="58" stroke="black" stroke-width="2.5" />
                    <circle cx="82" cy="48" r="4" fill="black" />
                </mask>
            </defs>
            
            <g class="hairy-glow" transform="translate(60, 55) scale(1.15)">
                <path 
                    fill="#00D1FF"
                    d="M50 20 C35 20 20 30 15 50 L5 30 L5 70 L15 50 C20 70 35 80 50 80 C70 80 85 70 90 50 C85 30 70 20 50 20 Z M50 20 C55 10 65 5 75 5 C65 5 55 10 50 20 Z M50 80 C55 90 65 95 75 95 C65 95 55 90 50 80 Z" 
                    mask="url(#pomfret-mask-master)" 
                />
                <circle class="rgb-eye" cx="82" cy="48" r="3" fill="url(#eyeGradient-master)" />
            </g>
            
            <g transform="translate(141, 100)">
                <path 
                    class="neon-path"
                    d="M0, -45 L420, -45 L420, 50 L0, 50 L0, -45" 
                    fill="none" 
                    stroke="url(#neonGradient-master)" 
                    stroke-width="3" 
                    stroke-linecap="round"
                    opacity="0.8"
                />
                
                <text 
                    fill="#F8FAFC"
                    style="font-family: 'Inter', sans-serif; font-weight: 900; font-style: italic; font-size: 58px; letter-spacing: -0.06em; text-transform: uppercase;"
                    dominant-baseline="middle"
                    x="0" y="0"
                >
                    OceanExotic
                </text>
                
                <g transform="translate(0, 38)">
                    <rect fill="#00D1FF" x="0" y="-8" width="50" height="5" rx="2.5" />
                    <text 
                        fill="#00D1FF"
                        style="font-family: 'Inter', sans-serif; font-weight: 900; font-style: italic; font-size: 24px; text-transform: uppercase; letter-spacing: 0.5em;"
                        x="65" y="0"
                    >
                        GLOBAL
                    </text>
                </g>
            </g>
        </svg>
    </div>
    <div class="label">Institutional Master Registry | Sovereign Identity V3</div>
</body>
</html>
