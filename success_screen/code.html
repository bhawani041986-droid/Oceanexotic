</div>
</div>

<h1 class="text-[32px] md:text-[40px] font-bold leading-tight tracking-tight text-on-surface">
                        Operation Successful
                    </h1>
<p class="text-on-surface-variant text-lg md:text-xl font-body leading-relaxed max-w-md mx-auto">

</button>
<div class="flex items-center justify-center gap-6 mt-4">
<div class="flex items-center gap-2 text-on-surface-variant/60 text-sm font-label uppercase tracking-widest">
<span class="material-symbols-outlined text-sm">security</span>

                        </div>
<div class="w-1 h-1 bg-outline-variant rounded-full"></div>
<div class="flex items-center gap-2 text-on-surface-variant/60 text-sm font-label uppercase tracking-widest">
<span class="material-symbols-outlined text-sm">database</span>
                            Immutable Log
                        </div>
</div>
</div>

<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
</div>

<div class="mt-8 flex justify-center">
<div class="inline-flex items-center gap-3 px-4 py-2 bg-surface-container-low rounded-full border border-white/5">

<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-tertiary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-tertiary"></span>
</span>
